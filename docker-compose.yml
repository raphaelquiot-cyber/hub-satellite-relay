services:
  relay:
    build: .
    restart: always
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      MIN_TOKEN_LENGTH: "32"
    # En production sur EasyPanel :
    # - Régler "App Port" à 4000 dans les settings du projet
    #   (EasyPanel injecte PORT=<App Port> au runtime)
    # - Les ports: ci-dessus s'appliquent uniquement à docker compose local
